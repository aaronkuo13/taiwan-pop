<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Taiwan Pop — 展演活動，2026 年十二場跨領域藝文展演在紐約登場">
  <title>展演活動 — Taiwan Pop</title>
  <link rel="stylesheet" href="css/tp-shared.css">
  <link rel="stylesheet" href="css/style.css?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-K6V2LJ748H"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-K6V2LJ748H');
  </script>

  <style>
  .page-top { padding-top: 5rem; }

  /* override old style.css featured-event rules */
  #featured-event { padding: 0; background: transparent; border: none; }

  /* stronger graffiti shadow on category titles */
  .cat-sound-title  { text-shadow: 4px 4px 0 rgba(255,45,107,0.45), -2px -2px 0 rgba(0,255,87,0.1); }
  .cat-image-title  { text-shadow: 4px 4px 0 rgba(59,127,255,0.45), -2px -2px 0 rgba(255,45,107,0.08); }
  .cat-street-title { text-shadow: 4px 4px 0 rgba(0,255,87,0.35),   -2px -2px 0 rgba(59,127,255,0.08); }

  /* ── FEATURED BANNER · Ticket Stub ── */
  .featured-wrap { padding: 2rem 2.5rem 0; }
  .featured-ticket {
    position: relative; display: grid; grid-template-columns: 240px 1fr;
    background: #0d0d0d; border: 1px solid var(--border);
    overflow: hidden; text-decoration: none; color: inherit;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .featured-ticket:hover { transform: translateY(-3px); box-shadow: 6px 6px 0 var(--ticket-color, var(--green)); }
  .ticket-stub {
    position: relative; background: var(--green); color: var(--black);
    padding: 2.4rem 1.6rem;
    display: flex; flex-direction: column; justify-content: space-between;
    min-height: 320px;
  }
  .ticket-stub::after {
    content: ''; position: absolute; top: 0; bottom: 0; right: -1px; width: 2px;
    background-image: radial-gradient(circle, var(--black) 1.5px, transparent 2px);
    background-size: 2px 10px; background-repeat: repeat-y;
  }
  .ticket-stub::before {
    content: ''; position: absolute; right: -14px; top: 50%; transform: translateY(-50%);
    width: 28px; height: 28px; border-radius: 50%; background: var(--black); z-index: 1;
  }
  .stub-no { font-family: var(--font-m); font-size: 0.62rem; letter-spacing: 0.25em; opacity: 0.8; }
  .stub-date { display: flex; flex-direction: column; align-items: flex-start; line-height: 0.85; margin-top: auto; }
  .stub-month { font-family: var(--font-d); font-weight: 900; font-size: 2.6rem; letter-spacing: 0.02em; }
  .stub-day { font-family: var(--font-d); font-weight: 900; font-size: 6.5rem; letter-spacing: -0.04em; margin-top: -0.3rem; }
  .stub-weekday {
    font-family: var(--font-m); font-size: 0.7rem; letter-spacing: 0.3em;
    padding-top: 0.6rem; margin-top: 0.6rem;
    border-top: 1.5px solid var(--black); align-self: stretch;
  }
  .stub-tag {
    position: absolute; top: 1.2rem; right: 1.4rem;
    font-family: var(--font-m); font-size: 0.55rem; letter-spacing: 0.22em;
    background: var(--black); color: var(--green); padding: 0.3rem 0.55rem; z-index: 2;
  }
  .ticket-info {
    padding: 2.4rem 2.6rem; display: flex; flex-direction: column; gap: 1rem;
    position: relative;
    background: radial-gradient(circle at 90% 15%, rgba(0,255,87,0.06) 0%, transparent 45%), #0d0d0d;
  }
  .ticket-meta {
    display: flex; align-items: center; gap: 0.8rem;
    font-family: var(--font-m); font-size: 0.6rem;
    letter-spacing: 0.22em; color: rgba(255,255,255,0.55);
  }
  .ticket-meta .dot { color: var(--green); }
  .ticket-title {
    font-family: var(--font-d); font-weight: 900;
    font-size: clamp(2rem, 3.4vw, 3.2rem); line-height: 1.02; letter-spacing: 0.02em;
    color: var(--white); margin: 0.2rem 0 0.3rem;
    text-shadow: 3px 3px 0 var(--ticket-shadow, rgba(0,255,87,0.22));
  }
  .ticket-subtitle { font-size: 0.9rem; color: rgba(255,255,255,0.65); letter-spacing: 0.04em; }
  .ticket-venue {
    display: flex; align-items: center; gap: 0.6rem;
    font-family: var(--font-m); font-size: 0.72rem;
    letter-spacing: 0.12em; color: rgba(255,255,255,0.7);
    padding-top: 0.8rem; border-top: 1px dashed rgba(255,255,255,0.12);
  }
  .ticket-venue::before { content: '◉'; color: var(--pink); font-size: 0.7rem; }
  .ticket-cta { margin-top: auto; display: flex; justify-content: space-between; align-items: flex-end; gap: 1rem; }
  .ticket-cta-label { font-family: var(--font-m); font-size: 0.6rem; letter-spacing: 0.22em; color: rgba(255,255,255,0.4); }
  .ticket-cta-arrow { font-family: var(--font-d); font-weight: 900; font-size: 1.3rem; color: var(--ticket-color, var(--green)); transition: transform 0.3s ease; }
  .featured-ticket:hover .ticket-cta-arrow { transform: translateX(8px); }
  .ticket-barcode { position: absolute; right: 2.6rem; top: 2.4rem; display: flex; gap: 2px; align-items: flex-start; opacity: 0.5; }
  .ticket-barcode i { display: block; width: 2px; background: rgba(255,255,255,0.4); }

  /* ── CATEGORY SECTION ── */
  .cat-section { padding: 4rem 0; border-top: 1px solid var(--border); }
  .cat-section-header {
    padding: 0 2.5rem 2rem;
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .cat-section-title-wrap { display: flex; align-items: center; gap: 1rem; }
  .cat-section-title {
    font-family: var(--font-d); font-size: clamp(2.5rem,5vw,5rem);
    letter-spacing: 0.04em; line-height: 1; color: var(--white);
  }
  .cat-sound-title  { text-shadow: 3px 3px 0 rgba(255,45,107,0.35); }
  .cat-image-title  { text-shadow: 3px 3px 0 rgba(59,127,255,0.35); }
  .cat-street-title { text-shadow: 3px 3px 0 rgba(0,255,87,0.25); }
  .cat-count {
    font-family: var(--font-d); font-size: 3rem; line-height: 1;
    opacity: 0.15; letter-spacing: -0.02em; color: var(--white);
  }
  .cat-desc { font-size: 0.82rem; color: rgba(255,255,255,0.4); margin-top: 0.4rem; }

  /* ── PRIMARY CARDS (3-col) ── */
  .primary-grid {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 1px; background: var(--border);
    margin-bottom: 1px;
  }
  .primary-card {
    background: var(--black); display: flex; flex-direction: column;
    text-decoration: none; color: var(--white);
    position: relative; overflow: hidden;
    transition: transform 0.25s;
  }
  .primary-card:hover { transform: translateY(-4px); z-index: 1; }
  .primary-card-img { aspect-ratio: 4/5; background: #111; overflow: hidden; }
  .primary-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .primary-card-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-d); font-size: 4rem; opacity: 0.06;
  }
  .primary-card-body { padding: 1.4rem 1.2rem 1.2rem; flex: 1; display: flex; flex-direction: column; }
  .primary-card-cat  { margin-bottom: 0.6rem; }
  .primary-card-title { font-family: var(--font-d); font-size: 1.8rem; letter-spacing: 0.03em; line-height: 1.05; }
  .primary-card-subtitle { font-size: 0.78rem; color: rgba(255,255,255,0.45); margin-top: 0.3rem; }
  .primary-card-date {
    font-family: var(--font-m); font-size: 0.6rem;
    letter-spacing: 0.14em; color: rgba(255,255,255,0.28);
    margin-top: auto; padding-top: 0.8rem;
  }
  .primary-card-sound:hover  { box-shadow: 0 0 0 2px var(--pink),  0 10px 30px rgba(245,34,129,0.15); }
  .primary-card-image:hover  { box-shadow: 0 0 0 2px var(--blue),  0 10px 30px rgba(59,127,255,0.15); }
  .primary-card-street:hover { box-shadow: 0 0 0 2px var(--green), 0 10px 30px rgba(0,255,87,0.12); }

  /* ── SECONDARY CARDS (4-col) ── */
  .secondary-grid {
    display: grid; grid-template-columns: repeat(4,1fr);
    gap: 1px; background: var(--border);
  }
  .secondary-card {
    background: #0c0c0c; display: flex; flex-direction: column;
    text-decoration: none; color: var(--white);
    position: relative; overflow: hidden;
    transition: background 0.2s;
  }
  .secondary-card:hover { background: #141414; }
  .secondary-card-img { aspect-ratio: 4/5; background: #111; overflow: hidden; }
  .secondary-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .secondary-card-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-d); font-size: 3rem; opacity: 0.05;
  }
  .secondary-card-body { padding: 1.1rem 1rem 1rem; }
  .secondary-card-cat   { margin-bottom: 0.5rem; }
  .secondary-card-title { font-family: var(--font-d); font-size: 1.4rem; letter-spacing: 0.03em; line-height: 1.1; }
  .secondary-card-date  {
    font-family: var(--font-m); font-size: 0.58rem;
    letter-spacing: 0.12em; color: rgba(255,255,255,0.25); margin-top: 0.5rem;
  }

  /* ── RESPONSIVE ── */

  /* 960px — tablet: 左欄縮窄、日期縮小、標題縮一階 */
  @media (max-width: 960px) {
    .featured-ticket { grid-template-columns: 200px 1fr; }
    .stub-day { font-size: 5.2rem; }
    .ticket-title { font-size: clamp(1.8rem, 3vw, 2.6rem); }
    .cat-section-header { padding: 0 1.2rem 1.5rem; }
    .primary-grid { grid-template-columns: repeat(2, 1fr); }
    .secondary-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* 720px — mobile: 單欄、票根橫版、撕線水平、圓洞移底部 */
  @media (max-width: 720px) {
    .featured-wrap { padding: 1.4rem 1.2rem 0; }
    .featured-ticket { grid-template-columns: 1fr; }
    .ticket-stub {
      min-height: 0; padding: 1.4rem 1.6rem;
      flex-direction: row; align-items: center; justify-content: space-between;
    }
    .ticket-stub::after {
      top: auto; bottom: -1px; left: 0; right: 0;
      width: 100%; height: 2px;
      background-image: radial-gradient(circle, var(--black) 1.5px, transparent 2px);
      background-size: 10px 2px; background-repeat: repeat-x;
    }
    .ticket-stub::before { right: 50%; top: auto; bottom: -14px; transform: translateX(50%); }
    .stub-no { writing-mode: vertical-rl; letter-spacing: 0.15em; font-size: 0.55rem; }
    .stub-date { flex-direction: row; align-items: baseline; gap: 0.5rem; margin-top: 0; }
    .stub-day { font-size: 3.8rem; margin-top: 0; }
    .stub-month { font-size: 1.8rem; }
    .stub-weekday { border: none; padding: 0; margin: 0; font-size: 0.6rem; }
    .ticket-info { padding: 1.6rem 1.6rem 1.8rem; }
    .ticket-title { font-size: 1.8rem; }
    .ticket-barcode { display: none; }
    .featured-ticket:hover { transform: none; box-shadow: none; }
    .featured-ticket:active { transform: translateY(-2px); box-shadow: 4px 4px 0 var(--ticket-color, var(--green)); }
  }

  /* 420px — xs: 再縮字級、移除 meta dot、venue 換行、shadow 變弱 */
  @media (max-width: 420px) {
    .stub-day { font-size: 3rem; }
    .ticket-title { font-size: 1.5rem; text-shadow: 1px 1px 0 var(--ticket-shadow, rgba(0,255,87,0.1)); }
    .ticket-meta .dot { display: none; }
    .ticket-venue { word-break: break-word; font-size: 0.65rem; }
    .secondary-grid { grid-template-columns: 1fr; }
  }

  @media (max-width: 640px) {
    .cat-section { padding: 2.5rem 0; }
    .cat-section-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; padding: 0 1rem 1.2rem; }
    .primary-grid { grid-template-columns: 1fr; }
    .secondary-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* ── COMING SOON OVERLAY ── */
  .card-coming {
    position: absolute; inset: 0;
    background: rgba(8,8,8,0.7);
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .card-coming span {
    font-family: var(--font-m); font-size: 0.6rem;
    letter-spacing: 0.22em; color: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 0.4rem 0.9rem;
  }
  </style>
</head>
<body>

  <!-- ======= NAVIGATION (injected by components.js) ======= -->
  <nav id="navbar"></nav>

  <div class="page-top">

    <!-- ======= FEATURED BANNER (JS-rendered) ======= -->
    <div id="featured-event"></div>

    <!-- ======= EVENTS (JS-rendered, grouped by category) ======= -->
    <div id="events">
      <div class="events-grid"></div>
    </div>

  </div><!-- /page-top -->

  <footer id="contact"></footer>

  <script src="js/lang.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/events.js"></script>
  <script src="js/reveal.js"></script>
  <script src="js/lang-init.js"></script>
</body>
</html>
