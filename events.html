<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Taiwan Pop — 展演活動，2026 年十二場跨領域藝文展演在紐約登場">
  <title>展演活動 — Taiwan Pop</title>
  <link rel="stylesheet" href="css/tp-shared.css">
  <link rel="stylesheet" href="css/style.css?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-K6V2LJ748H"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-K6V2LJ748H');
  </script>

  <style>
  .page-top { padding-top: 5rem; }

  /* override old style.css featured-event rules */
  #featured-event { padding: 0; background: transparent; border: none; }

  /* stronger graffiti shadow on category titles */
  .cat-sound-title  { text-shadow: 4px 4px 0 rgba(255,45,107,0.45), -2px -2px 0 rgba(0,255,87,0.1); }
  .cat-image-title  { text-shadow: 4px 4px 0 rgba(59,127,255,0.45), -2px -2px 0 rgba(255,45,107,0.08); }
  .cat-street-title { text-shadow: 4px 4px 0 rgba(0,255,87,0.35),   -2px -2px 0 rgba(59,127,255,0.08); }

  /* ── FEATURED BANNER · Image + Status Bar + Sticker ── */
  .featured-wrap { padding: 3.5rem 2.5rem 0; overflow: visible; }
  .featured-banner {
    position: relative; display: block;
    text-decoration: none; color: inherit;
    overflow: visible;
    transition: transform 0.3s ease;
  }
  .featured-banner:hover { transform: translateY(-2px); }

  .fb-image-wrap {
    position: relative;
    border: 1px solid var(--border);
    background: #fff200;
    overflow: visible;
    line-height: 0;
  }
  .fb-image-wrap img { display: block; width: 100%; height: auto; object-fit: contain; }

  .fb-sticker {
    position: absolute;
    top: -1.6rem; left: 2.5rem;
    transform: rotate(-6deg);
    background: var(--pink); color: var(--white);
    font-family: var(--font-d);
    font-size: 1.3rem; letter-spacing: 0.06em;
    padding: 0.6rem 1.1rem 0.55rem;
    box-shadow: 3px 3px 0 var(--black);
    z-index: 5; white-space: nowrap;
    display: flex; align-items: center; gap: 0.55rem;
  }
  .fb-sticker::before { content: '★'; font-size: 0.9rem; }
  .fb-sticker-en {
    font-family: var(--font-m);
    font-size: 0.55rem; letter-spacing: 0.22em; opacity: 0.9;
    border-left: 1px solid rgba(255,255,255,0.4);
    padding-left: 0.55rem;
  }

  .fb-status {
    display: flex; align-items: center; gap: 1.2rem;
    background: #0a0a0a;
    border: 1px solid var(--border); border-top: none;
    padding: 0.95rem 1.4rem;
    font-family: var(--font-m);
    font-size: 0.62rem; letter-spacing: 0.28em;
    color: rgba(255,255,255,0.85);
    text-transform: uppercase;
  }
  .fb-status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 rgba(0,255,87,0.6);
    animation: fb-pulse 1.6s ease-out infinite;
    flex-shrink: 0;
  }
  @keyframes fb-pulse {
    0%   { box-shadow: 0 0 0 0   rgba(0,255,87,0.55); }
    70%  { box-shadow: 0 0 0 10px rgba(0,255,87,0); }
    100% { box-shadow: 0 0 0 0   rgba(0,255,87,0); }
  }
  .fb-status-zh  { color: var(--green); letter-spacing: 0.32em; }
  .fb-status-sep { opacity: 0.3; }
  .fb-status-cta {
    margin-left: auto;
    display: flex; align-items: center; gap: 0.5rem;
    color: var(--green);
    transition: gap 0.25s ease;
  }
  .featured-banner:hover .fb-status-cta { gap: 0.85rem; }

  /* ── CATEGORY SECTION ── */
  .cat-section { padding: 4rem 0; border-top: 1px solid var(--border); }
  .cat-section-header {
    padding: 0 2.5rem 2rem;
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .cat-section-title-wrap { display: flex; align-items: center; gap: 1rem; }
  .cat-section-title {
    font-family: var(--font-d); font-size: clamp(2.5rem,5vw,5rem);
    letter-spacing: 0.04em; line-height: 1; color: var(--white);
  }
  .cat-sound-title  { text-shadow: 3px 3px 0 rgba(255,45,107,0.35); }
  .cat-image-title  { text-shadow: 3px 3px 0 rgba(59,127,255,0.35); }
  .cat-street-title { text-shadow: 3px 3px 0 rgba(0,255,87,0.25); }
  .cat-count {
    font-family: var(--font-d); font-size: 3rem; line-height: 1;
    opacity: 0.15; letter-spacing: -0.02em; color: var(--white);
  }
  .cat-desc { font-size: 0.82rem; color: rgba(255,255,255,0.4); margin-top: 0.4rem; }

  /* ── PRIMARY CARDS (3-col) ── */
  .primary-grid {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 1px; background: var(--border);
    margin-bottom: 1px;
  }
  .primary-card {
    background: var(--black); display: flex; flex-direction: column;
    text-decoration: none; color: var(--white);
    position: relative; overflow: hidden;
    transition: transform 0.25s;
  }
  .primary-card:hover { transform: translateY(-4px); z-index: 1; }
  .primary-card-img { aspect-ratio: 4/5; background: #111; overflow: hidden; }
  .primary-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .primary-card-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-d); font-size: 4rem; opacity: 0.06;
  }
  .primary-card-body { padding: 1.4rem 1.2rem 1.2rem; flex: 1; display: flex; flex-direction: column; }
  .primary-card-cat  { margin-bottom: 0.6rem; }
  .primary-card-title { font-family: var(--font-d); font-size: 1.8rem; letter-spacing: 0.03em; line-height: 1.05; }
  .primary-card-subtitle { font-size: 0.78rem; color: rgba(255,255,255,0.45); margin-top: 0.3rem; }
  .primary-card-date {
    font-family: var(--font-m); font-size: 0.6rem;
    letter-spacing: 0.14em; color: rgba(255,255,255,0.28);
    margin-top: auto; padding-top: 0.8rem;
  }
  .primary-card-sound:hover  { box-shadow: 0 0 0 2px var(--pink),  0 10px 30px rgba(245,34,129,0.15); }
  .primary-card-image:hover  { box-shadow: 0 0 0 2px var(--blue),  0 10px 30px rgba(59,127,255,0.15); }
  .primary-card-street:hover { box-shadow: 0 0 0 2px var(--green), 0 10px 30px rgba(0,255,87,0.12); }

  /* ── SECONDARY CARDS (4-col) ── */
  .secondary-grid {
    display: grid; grid-template-columns: repeat(4,1fr);
    gap: 1px; background: var(--border);
  }
  .secondary-card {
    background: #0c0c0c; display: flex; flex-direction: column;
    text-decoration: none; color: var(--white);
    position: relative; overflow: hidden;
    transition: background 0.2s;
  }
  .secondary-card:hover { background: #141414; }
  .secondary-card-img { aspect-ratio: 4/5; background: #111; overflow: hidden; }
  .secondary-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .secondary-card-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-d); font-size: 3rem; opacity: 0.05;
  }
  .secondary-card-body { padding: 1.1rem 1rem 1rem; }
  .secondary-card-cat   { margin-bottom: 0.5rem; }
  .secondary-card-title { font-family: var(--font-d); font-size: 1.4rem; letter-spacing: 0.03em; line-height: 1.1; }
  .secondary-card-date  {
    font-family: var(--font-m); font-size: 0.58rem;
    letter-spacing: 0.12em; color: rgba(255,255,255,0.25); margin-top: 0.5rem;
  }

  /* ── RESPONSIVE ── */

  /* Tablet ≤960px */
  @media (max-width: 960px) {
    .featured-wrap { padding: 3rem 1.6rem 0; }
    .fb-status { padding: 0.7rem 1rem; font-size: 0.56rem; letter-spacing: 0.2em; }
    .fb-sticker { font-size: 1.1rem; padding: 0.5rem 0.9rem; left: 1.5rem; top: -1.4rem; }
    .cat-section-header { padding: 0 1.2rem 1.5rem; }
    .primary-grid { grid-template-columns: repeat(2, 1fr); }
    .secondary-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* Mobile ≤720px */
  @media (max-width: 720px) {
    .featured-wrap { padding: 2.6rem 1rem 0; }
    .fb-status {
      flex-wrap: wrap; gap: 0.7rem;
      padding: 0.75rem 1rem;
      font-size: 0.54rem; letter-spacing: 0.18em;
    }
    .fb-status-cta { margin-left: 0; width: 100%; justify-content: flex-end; padding-top: 0.3rem; border-top: 1px dashed rgba(255,255,255,0.1); }
    .fb-sticker { font-size: 0.95rem; padding: 0.45rem 0.8rem 0.4rem; left: 1.2rem; top: -1.2rem; box-shadow: 2px 2px 0 var(--black); }
    .fb-sticker-en { display: none; }
    .featured-banner:hover { transform: none; }
    .featured-banner:active { transform: translateY(-1px); }
  }

  /* XS ≤420px */
  @media (max-width: 420px) {
    .featured-wrap { padding: 2.3rem 0.7rem 0; }
    .fb-status { padding: 0.65rem 0.8rem; font-size: 0.5rem; letter-spacing: 0.15em; gap: 0.5rem; }
    .fb-sticker { font-size: 0.82rem; padding: 0.38rem 0.7rem 0.33rem; left: 0.9rem; top: -1rem; }
    .secondary-grid { grid-template-columns: 1fr; }
  }

  @media (max-width: 640px) {
    .cat-section { padding: 2.5rem 0; }
    .cat-section-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; padding: 0 1rem 1.2rem; }
    .primary-grid { grid-template-columns: 1fr; }
    .secondary-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* ── COMING SOON OVERLAY ── */
  .card-coming {
    position: absolute; inset: 0;
    background: rgba(8,8,8,0.7);
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .card-coming span {
    font-family: var(--font-m); font-size: 0.6rem;
    letter-spacing: 0.22em; color: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 0.4rem 0.9rem;
  }
  </style>
</head>
<body>

  <!-- ======= NAVIGATION (injected by components.js) ======= -->
  <nav id="navbar"></nav>

  <div class="page-top">

    <!-- ======= FEATURED BANNER (JS-rendered) ======= -->
    <div id="featured-event"></div>

    <!-- ======= EVENTS (JS-rendered, grouped by category) ======= -->
    <div id="events">
      <div class="events-grid"></div>
    </div>

  </div><!-- /page-top -->

  <footer id="contact"></footer>

  <script>window.eventsVisibility = null;</script>
  <script src="js/lang.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/events.js"></script>
  <script src="js/reveal.js"></script>
  <script src="js/lang-init.js"></script>
  <script type="module">
    import { db } from './js/firebase.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    (async () => {
      try {
        const snap = await getDoc(doc(db, 'config', 'events_visibility'));
        window.eventsVisibility = snap.exists() ? snap.data() : {};
      } catch (e) {
        window.eventsVisibility = {};
      }
      renderEvents();
      renderFeaturedBanner();
    })();
  </script>
</body>
</html>
