<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 — Taiwan Pop</title>
  <link rel="stylesheet" href="css/style.css?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-K6V2LJ748H"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-K6V2LJ748H');
  </script>

  <style>
    .article-page {
      padding-top: var(--nav-h);
      min-height: 80vh;
    }

    .article-cover {
      width: 100%;
      max-height: 480px;
      object-fit: cover;
      display: block;
    }

    .article-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .article-meta .article-cat {
      position: static;
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      background: rgba(0, 130, 210, 0.2);
      color: var(--secondary);
    }

    .article-meta .article-date {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--text-muted);
    }

    .article-title {
      font-family: var(--font-sans);
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 900;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 36px;
    }

    .article-content {
      color: rgba(255,255,255,0.85);
      font-size: 16px;
      line-height: 1.9;
    }

    .article-content h1,
    .article-content h2,
    .article-content h3 {
      font-family: var(--font-sans);
      color: #fff;
      margin: 32px 0 16px;
    }
    .article-content h2 { font-size: 22px; }
    .article-content h3 { font-size: 18px; }

    .article-content p { margin-bottom: 20px; }
    .article-content img { max-width: 100%; border-radius: var(--radius); margin: 24px 0; }
    .article-content a { color: var(--primary); }
    .article-content a:hover { text-decoration: underline; }
    .article-content blockquote {
      border-left: 3px solid var(--primary);
      padding-left: 20px;
      margin: 24px 0;
      color: var(--text-muted);
      font-style: italic;
    }
    .article-content ul, .article-content ol {
      padding-left: 24px;
      margin-bottom: 20px;
    }
    .article-content li { margin-bottom: 8px; list-style: disc; }
    .article-content ol li { list-style: decimal; }

    .article-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-family: var(--font-sans);
      font-size: 13px;
      margin-bottom: 32px;
      transition: color var(--transition);
    }
    .article-back:hover { color: var(--primary); }

    .article-loading,
    .article-error {
      text-align: center;
      padding: 80px 0;
      color: var(--text-muted);
    }
    .article-loading::after {
      content: '';
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <nav id="navbar"></nav>

  <div class="article-page">
    <div id="article-root">
      <div class="article-container">
        <div class="article-loading">載入中</div>
      </div>
    </div>
  </div>

  <footer id="contact"></footer>

  <script src="js/lang.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/reveal.js"></script>
  <script src="js/lang-init.js"></script>

  <script type="module">
    import { db } from './js/firebase.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const articleId = params.get('id');
    let articleData = null;

    function getLang() {
      return window.currentLang || localStorage.getItem('twpop_lang') || 'zh';
    }

    function formatDate(str) {
      return (str || '').replace(/-/g, '.');
    }

    function render(a) {
      const lang = getLang();
      const title = (lang === 'en' && a.title_en) ? a.title_en : (a.title || '');
      const content = (lang === 'en' && a.content_en) ? a.content_en : (a.content || '');

      document.title = `${title} — Taiwan Pop`;

      const root = document.getElementById('article-root');
      root.innerHTML = `
        ${a.coverImage ? `<img class="article-cover" src="${a.coverImage}" alt="${title}">` : ''}
        <div class="article-container">
          <a href="news.html" class="article-back">
            ← 返回最新消息
          </a>
          <div class="article-meta">
            ${a.category ? `<span class="article-cat">${a.category}</span>` : ''}
            <span class="article-date">${formatDate(a.date)}</span>
          </div>
          <h1 class="article-title">${title}</h1>
          <div class="article-content">${content}</div>
        </div>`;
    }

    async function loadArticle() {
      if (!articleId) {
        document.getElementById('article-root').innerHTML =
          '<div class="article-container"><div class="article-error">找不到文章</div></div>';
        return;
      }

      try {
        const snap = await getDoc(doc(db, 'articles', articleId));
        if (!snap.exists() || !snap.data().published) {
          document.getElementById('article-root').innerHTML =
            '<div class="article-container"><div class="article-error">文章不存在或尚未發布</div></div>';
          return;
        }
        articleData = snap.data();
        render(articleData);
      } catch (err) {
        console.error(err);
        document.getElementById('article-root').innerHTML =
          '<div class="article-container"><div class="article-error">載入失敗，請稍後再試</div></div>';
      }
    }

    window.reRenderNews = function () {
      if (articleData) render(articleData);
    };

    loadArticle();
  </script>

</body>
</html>
