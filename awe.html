<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="a-we NYC Run — 跑過紐約，探索台灣文化展演">
  <title>a-we 紐約跑酷 / NYC Run — Taiwan Pop</title>
  <link rel="stylesheet" href="css/style.css?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-K6V2LJ748H"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-K6V2LJ748H');
  </script>

  <style>
    /* ── Page Hero ── */
    .nyc-run-hero {
      padding: calc(var(--nav-h) + 56px) 0 40px;
      text-align: center;
    }
    .nyc-run-hero .section-tag { margin-bottom: 14px; }
    .nyc-run-hero h1 {
      font-family: var(--font-sans);
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900;
      color: #fff;
      margin-bottom: 10px;
    }
    .nyc-run-hero h1 span { color: var(--primary); }
    .nyc-run-hero p {
      color: var(--text-muted);
      font-size: 15px;
    }

    /* ── Two-column layout ── */
    .game-layout {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 20px 80px;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 32px;
      align-items: start;
    }

    /* ── Game wrapper ── */
    .game-canvas-wrap {
      background: #000;
      border: 1px solid rgba(0,255,0,0.25);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      line-height: 0;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: auto;
      image-rendering: pixelated;
    }

    .game-hint {
      text-align: center;
      margin-top: 12px;
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--text-light);
      letter-spacing: 1px;
    }

    /* ── Leaderboard ── */
    .leaderboard {
      position: sticky;
      top: calc(var(--nav-h) + 20px);
    }
    .leaderboard-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .leaderboard-header h2 {
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
      white-space: nowrap;
    }
    .lb-divider {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    @media (max-width: 700px) {
      .game-layout {
        grid-template-columns: 1fr;
      }
      .leaderboard { position: static; }
    }

    #lb-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .lb-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 18px;
      font-family: var(--font-sans);
      transition: border-color .2s;
    }
    .lb-row.lb-you {
      border-color: var(--primary);
      background: rgba(0,255,0,0.05);
    }
    .lb-rank {
      font-size: 15px;
      min-width: 28px;
      text-align: center;
      color: var(--text-muted);
    }
    .lb-name {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }
    .lb-score {
      font-size: 14px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--primary);
      letter-spacing: 1px;
    }
    .lb-status {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── Name input modal ── */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-bg.open { display: flex; }

    .modal-box {
      background: #111;
      border: 1px solid var(--primary);
      border-radius: 14px;
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .modal-box h3 {
      font-family: var(--font-sans);
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 8px;
    }
    .modal-box .modal-sub {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 6px;
    }
    .modal-score {
      font-family: var(--font-sans);
      font-size: 36px;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: 4px;
      margin-bottom: 28px;
    }
    .modal-box input[type="text"] {
      display: block;
      width: 100%;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      font-family: var(--font-sans);
      padding: 12px 16px;
      text-align: center;
      outline: none;
      margin-bottom: 16px;
      transition: border-color .2s;
    }
    .modal-box input[type="text"]:focus { border-color: var(--primary); }

    .modal-actions { display: flex; gap: 10px; }
    .btn-name-submit {
      flex: 1;
      background: var(--primary);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-name-submit:hover { opacity: .85; }
    .btn-name-skip {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      padding: 12px 18px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-name-skip:hover { border-color: #fff; color: #fff; }
  </style>
</head>
<body>

  <nav id="navbar"></nav>

  <!-- Hero -->
  <div class="nyc-run-hero">
    <div class="container">
      <span class="section-tag">GAME</span>
      <h1 data-i18n-html="game-awe-title">a-we <span>紐約</span>跑酷</h1>
      <p data-i18n="game-awe-sub">跑過紐約，跳越展演場館，探索 Taiwan Pop 文化活動</p>
    </div>
  </div>

  <!-- Game + Leaderboard two-column -->
  <div class="game-layout">

    <!-- Left: Game -->
    <div>
      <div class="game-canvas-wrap">
        <canvas id="game-canvas" width="800" height="320"></canvas>
      </div>
      <p class="game-hint">SPACE / ↑ / TAP — JUMP &nbsp;·&nbsp; 跳過建築物解鎖活動資訊</p>
    </div>

    <!-- Right: Leaderboard -->
    <div class="leaderboard">
      <div class="leaderboard-header">
        <h2>排行榜</h2>
        <div class="lb-divider"></div>
        <span class="section-tag" style="margin:0">TOP 10</span>
      </div>
      <ul id="lb-list">
        <li class="lb-status">載入中...</li>
      </ul>
    </div>

  </div>

  <!-- Name Input Modal -->
  <div class="modal-bg" id="name-modal">
    <div class="modal-box">
      <h3>進入排行榜！</h3>
      <p class="modal-sub">本次得分</p>
      <div class="modal-score" id="modal-score-val">00000</div>
      <input type="text" id="player-name" placeholder="輸入你的名字" maxlength="16" autocomplete="off">
      <div class="modal-actions">
        <button class="btn-name-submit" id="name-submit">記錄分數</button>
        <button class="btn-name-skip"   id="name-skip">略過</button>
      </div>
    </div>
  </div>

  <footer id="contact"></footer>

  <script src="js/lang.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/reveal.js"></script>
  <script src="js/lang-init.js"></script>
  <script type="module" src="js/awe-game.js"></script>

</body>
</html>
