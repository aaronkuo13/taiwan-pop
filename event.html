  <style>
  /* ── EVENT HERO ── */
  .ev-hero {
    padding-top: 5rem;
    display: grid; grid-template-columns: 1fr 1fr;
    position: relative; overflow: hidden;
  }
  .ev-hero-left {
    color: var(--white);
    padding: 4rem 3rem;
    display: flex; flex-direction: column; justify-content: flex-start;
    position: relative; overflow: hidden;
  }
  .ev-hero-left--sound  { background: var(--pink); }
  .ev-hero-left--image  { background: var(--blue); }
  .ev-hero-left--street { background: var(--green); color: var(--black); }
  .ev-hero-left::before {
    content: ''; position: absolute; inset: 0;
    background: url('images/Taiwan Pop_Supporting Graphic 3_星光背景_拆圖版.webp') center/cover no-repeat;
    opacity: 0.15; mix-blend-mode: screen; pointer-events: none;
  }
  .ev-hero-left > * { position: relative; z-index: 1; }
  .ev-back {
    font-family: var(--font-m); font-size: 0.6rem; letter-spacing: 0.18em;
    color: rgba(255,255,255,0.6); margin-bottom: 2rem;
    display: inline-flex; align-items: center; gap: 0.4rem;
    transition: color 0.2s; text-decoration: none;
  }
  .ev-hero-left--street .ev-back { color: rgba(0,0,0,0.5); }
  .ev-back:hover { color: var(--white); }
  .ev-hero-left--street .ev-back:hover { color: var(--black); }
  .ev-cat-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem; }
  .ev-num { font-family: var(--font-m); font-size: 0.6rem; letter-spacing: 0.2em; opacity: 0.6; }
  .ev-title {
    font-family: var(--font-d);
    font-size: clamp(2.5rem, 4vw, 4.5rem);
    line-height: 1; letter-spacing: 0.03em;
    text-shadow: 4px 4px 0 rgba(0,0,0,0.3);
  }
  .ev-subtitle { font-size: 1rem; opacity: 0.75; margin-top: 0.6rem; font-weight: 300; }
  .ev-meta { margin-top: 2rem; display: flex; flex-direction: column; gap: 0.5rem; }
  .ev-meta-row {
    display: flex; align-items: center; gap: 0.8rem;
    font-family: var(--font-m); font-size: 0.65rem; letter-spacing: 0.1em;
  }
  .ev-meta-key { opacity: 0.5; min-width: 3.5rem; }
  .ev-meta-val { opacity: 0.9; }
  .ev-actions { margin-top: auto; padding-top: 2rem; display: flex; gap: 0.8rem; flex-wrap: wrap; }

  .ev-hero-right {
    background: #0f0f0f;
    overflow: hidden; position: relative;
    align-self: stretch;
  }
  .ev-hero-right img { width: 100%; height: auto; display: block; }
  .ev-hero-img-placeholder {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #141414 0%, #0a0a0a 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .ev-hero-img-placeholder span {
    font-family: var(--font-d); font-size: 14rem; opacity: 0.06;
    color: var(--white); line-height: 1;
  }
  .ev-img-sticker {
    position: absolute; bottom: 2rem; left: 2rem;
    background: var(--green); color: var(--black);
    padding: 0.5rem 0.9rem;
    font-family: var(--font-d); font-size: 1.4rem;
    letter-spacing: 0.06em; line-height: 1.1;
    transform: rotate(-2deg);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
  }
  .ev-img-sticker small {
    display: block; font-family: var(--font-m);
    font-size: 0.5rem; letter-spacing: 0.2em; opacity: 0.7; margin-top: 0.15rem;
  }

  /* ── CONTENT SECTIONS ── */
  .ev-content { max-width: 1100px; margin: 0 auto; padding: 0 2.5rem 4rem; }
  .ev-section { padding: 4rem 0; border-top: 1px solid var(--border); }
  .ev-section.is-hidden { display: none; }
  .ev-section-label {
    font-family: var(--font-m); font-size: 0.58rem;
    letter-spacing: 0.28em; color: rgba(255,255,255,0.3);
    margin-bottom: 1.5rem; display: block; text-transform: uppercase;
  }
  .ev-section-title {
    font-family: var(--font-d);
    font-size: clamp(2rem,4vw,3.5rem);
    letter-spacing: 0.04em; line-height: 1;
    text-shadow: 3px 3px 0 rgba(255,45,107,0.25);
    margin-bottom: 1.5rem;
  }
  .ev-body {
    font-size: 0.9rem; line-height: 2;
    color: rgba(255,255,255,0.6); max-width: 680px;
    margin-bottom: 1rem;
  }
  .ev-body:last-child { margin-bottom: 0; }

  /* video */
  .ev-video-wrap {
    aspect-ratio: 16/9; background: #111;
    position: relative; overflow: hidden;
    max-width: 800px;
  }
  .ev-video-wrap iframe { width: 100%; height: 100%; border: none; position: absolute; inset: 0; }

  /* program */
  .ev-program { display: flex; flex-direction: column; max-width: 680px; }
  .ev-program-item {
    display: grid; grid-template-columns: 1fr auto;
    gap: 2rem; align-items: baseline;
    padding: 1rem 0; border-bottom: 1px solid var(--border);
  }
  .ev-program-item:first-child { border-top: 1px solid var(--border); }
  .ev-program-title { font-size: 0.9rem; line-height: 1.5; }
  .ev-program-premiere {
    font-family: var(--font-m); font-size: 0.52rem;
    letter-spacing: 0.18em; color: var(--green);
    background: rgba(0,255,87,0.08);
    padding: 0.2rem 0.5rem; margin-left: 0.6rem;
  }
  .ev-program-en { font-size: 0.75rem; color: rgba(255,255,255,0.3); margin-top: 0.2rem; font-style: italic; }

  /* ensemble */
  .ev-ensemble {
    display: grid; grid-template-columns: 200px 1fr;
    gap: 3rem; align-items: start;
    background: #0e0e0e; padding: 2rem;
    border-left: 3px solid var(--pink);
  }
  .ev-ensemble-photo { aspect-ratio: 3/4; background: #1a1a1a; overflow: hidden; }
  .ev-ensemble-photo img { width: 100%; height: 100%; object-fit: cover; }
  .ev-ensemble-logo { max-height: 40px; width: auto; margin-bottom: 0.8rem; display: block; filter: brightness(0) invert(1); }
  .ev-ensemble-name { font-family: var(--font-d); font-size: 2rem; letter-spacing: 0.04em; line-height: 1.1; }
  .ev-ensemble-name-en { font-size: 0.8rem; color: rgba(255,255,255,0.35); margin-top: 0.2rem; }
  .ev-ensemble-bio { margin-top: 1rem; font-size: 0.85rem; line-height: 1.85; color: rgba(255,255,255,0.5); }
  .ev-ensemble-social { margin-top: 1.2rem; display: flex; gap: 0.6rem; }
  .ev-social-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.4); transition: border-color 0.2s, color 0.2s;
    text-decoration: none;
  }
  .ev-social-btn:hover { border-color: var(--pink); color: var(--white); }
  .ev-ensemble-no-photo { grid-template-columns: 1fr; }

  /* speakers */
  .ev-speakers-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 1.5rem; }
  .ev-speaker { background: #0e0e0e; padding: 1.8rem; border-top: 2px solid var(--pink); }
  .ev-speaker-name { font-family: var(--font-d); font-size: 1.8rem; letter-spacing: 0.04em; line-height: 1.1; }
  .ev-speaker-role { font-family: var(--font-m); font-size: 0.6rem; letter-spacing: 0.18em; color: var(--pink); margin-top: 0.3rem; }
  .ev-speaker-bio { margin-top: 0.9rem; font-size: 0.82rem; line-height: 1.8; color: rgba(255,255,255,0.5); }
  .ev-speaker-links { margin-top: 0.8rem; display: flex; gap: 0.5rem; }

  /* performers */
  .ev-performers-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 0; background: var(--border); }
  .ev-performer { background: #0e0e0e; padding: 1.5rem; display: flex; flex-direction: column; gap: 0.2rem; }
  .ev-performer-instr { font-family: var(--font-m); font-size: 0.58rem; letter-spacing: 0.2em; color: rgba(255,255,255,0.3); }
  .ev-performer-name { font-family: var(--font-d); font-size: 1.5rem; letter-spacing: 0.04em; line-height: 1.1; }
  .ev-performer-bio { font-size: 0.78rem; line-height: 1.7; color: rgba(255,255,255,0.4); margin-top: 0.4rem; }
  .ev-performer-links { margin-top: 0.6rem; display: flex; gap: 0.5rem; }

  /* gallery */
  .ev-gallery { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; }
  .ev-gallery-item { aspect-ratio: 4/3; background: #111; overflow: hidden; }
  .ev-gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
  .ev-gallery-item:hover img { transform: scale(1.04); }

  /* btn overrides — square corners per design */
  .ev-hero .btn, .ev-content .btn { border-radius: 0; }
  .btn-white { background: var(--white); color: var(--black); font-weight: 500; }
  .btn-white:hover { background: rgba(244,242,236,0.9); }
  .ev-hero .btn-outline {
    background: transparent;
    color: var(--white);
    border: 1.5px solid rgba(255,255,255,0.5);
  }
  .ev-hero .btn-outline:hover { border-color: var(--white); }
  .ev-hero-left--street .btn-outline {
    color: var(--black);
    border-color: rgba(0,0,0,0.4);
  }
  .ev-hero-left--street .btn-outline:hover { border-color: var(--black); }

  /* ── RWD ── */
  @media (max-width: 900px) {
    .ev-hero { grid-template-columns: 1fr; height: auto; }
    .ev-hero-right { height: auto; min-height: unset; }
    .ev-hero-left { padding: 5rem 2rem 2.5rem; }
    .ev-speakers-grid { grid-template-columns: 1fr; }
    .ev-gallery { grid-template-columns: repeat(2,1fr); }
  }
  @media (max-width: 600px) {
    .ev-hero-left { padding: 5rem 1.5rem 2rem; }
    .ev-content { padding: 0 1.5rem 3rem; }
    .ev-ensemble { grid-template-columns: 1fr; gap: 1.5rem; }
    .ev-ensemble-photo { max-width: 180px; }
    .ev-performers-grid { grid-template-columns: 1fr; }
    .ev-gallery { grid-template-columns: 1fr; }
    .ev-speakers-grid { grid-template-columns: 1fr; }
    .ev-program-item { grid-template-columns: 1fr; gap: 0.3rem; }
  }
  </style>
</head>

      <div id="detailProgram"    class="ev-section is-hidden"></div>
      <div id="detailEnsemble"   class="ev-section is-hidden"></div>
      <div id="detailSpeakers"   class="ev-section is-hidden"></div>
      <div id="detailPerformers" class="ev-section is-hidden"></div>
      <div id="detailGallery"    class="ev-section is-hidden"></div>
    </div>
  </div>

  <footer id="contact"></footer>
